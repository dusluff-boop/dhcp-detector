name: Build Windows EXE - DHCP Detector

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        # 无需 with: toolset: latest

      - name: Compile with Visual C++ (using /utf-8 for Chinese support)
        run: |
          cl /nologo ^
             /EHsc ^
             /DWIN32 /D_WINDOWS /DUNICODE /D_UNICODE ^
             /utf-8 ^
             main.cpp ^
             user32.lib ws2_32.lib iphlpapi.lib ^
             /Fe:dhcp-detector.exe ^
             /link /SUBSYSTEM:WINDOWS
        shell: cmd

      - name: Verify executable exists
        run: dir dhcp-detector.exe
        shell: cmd
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhcp-detector-windows
          path: |
            dhcp-detector.exe
            main.cpp
          retention-days: 14
