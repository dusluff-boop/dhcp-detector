name: Build Windows EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile
        run: |
          cl /EHsc /DWIN32 /D_WINDOWS /DUNICODE /D_UNICODE main.cpp user32.lib ws2_32.lib iphlpapi.lib /Fe:dhcp-detector.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: dhcp-detector
          path: dhcp-detector.exe
