name: Build and Release DHCP Detector

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup MSVC
      uses: microsoft/setup-msvc@v1
      with:
        version: 'latest'

    - name: Compile DHCP Detector
      shell: cmd
      run: cl /std:c++17 /EHsc /DUNICODE /D_UNICODE /DWIN32_LEAN_AND_MEAN /MT main.cpp user32.lib ws2_32.lib iphlpapi.lib /Fe:dhcp-detector.exe

    - name: Zip executable
      run: powershell -Command "Compress-Archive -Path dhcp-detector.exe -DestinationPath dhcp-detector-${{ github.ref_name }}.zip"

    - name: Create GitHub Release and upload exe
      uses: softprops/action-gh-release@v2
      with:
        files: dhcp-detector-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
