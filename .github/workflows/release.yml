name: Build DHCP Detector

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    # 直接用 preinstalled Visual Studio Developer Command Prompt
    - name: Build EXE
      shell: cmd
      run: |
        REM 初始化 VS 编译环境
        call "%VS140COMNTOOLS%..\..\VC\vcvarsall.bat" x64 || call "%VS160COMNTOOLS%..\..\VC\Auxiliary\Build\vcvarsall.bat" x64

        REM 编译 main.cpp
        cl /std:c++17 /EHsc /DUNICODE /D_UNICODE /DWIN32_LEAN_AND_MEAN /MT main.cpp user32.lib ws2_32.lib iphlpapi.lib /Fe:dhcp-detector.exe

    - name: Zip exe
      shell: powershell
      run: Compress-Archive -Path dhcp-detector.exe -DestinationPath dhcp-detector-${{ github.ref_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dhcp-detector-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
