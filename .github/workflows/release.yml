name: Build and Release DHCP Detector

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 必须，否则 softprops/action-gh-release 无法创建 release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up MSVC
      uses: microsoft/setup-msbuild@v1

    - name: Compile DHCP Detector
      run: |
        cl /std:c++17 /EHsc /DUNICODE /D_UNICODE /DWIN32_LEAN_AND_MEAN /MT main.cpp user32.lib ws2_32.lib iphlpapi.lib /Fe:dhcp-detector.exe
      shell: cmd

    - name: Zip executable
      run: powershell -Command "Compress-Archive -Path dhcp-detector.exe -DestinationPath dhcp-detector-${{ github.ref_name }}.zip"

    - name: Create GitHub Release and upload exe
      uses: softprops/action-gh-release@v2
      with:
        files: dhcp-detector-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
