name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile (Unicode + Static)
        run: cl /std:c++17 /EHsc /DUNICODE /D_UNICODE /DWIN32_LEAN_AND_MEAN /MT main.cpp user32.lib ws2_32.lib iphlpapi.lib /Fe:dhcp-detector.exe

      - name: Create ZIP package
        run: |
          powershell Compress-Archive dhcp-detector.exe dhcp-detector-${{ github.ref_name }}.zip

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dhcp-detector-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
